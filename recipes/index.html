<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    
    <title>Recipe Book</title>
    <link rel="stylesheet" href="recipebook.css">
    <script src="recipebook.js" defer></script>
</head>
<body>
<header>
    <div id="logo">
        <img src="images/recipe-book.png" alt="Recipe Book site logo">
        <h1>RecipeBook</h1>
    </div>
    <form id="search-box">
        <input id="find-a-recipe" type="text" placeholder="Find a recipe">
        <img id="search-button" src="images/search.svg" alt="">
    </form>
</header>
<main>
    <article class="recipe-card">
        <img src="images/apple-crisp.jpg" alt="apple crisp with vanilla ice cream">
        <div class="recipe-info">
            <button>dessert</button>
            <h2 class="recipe-name">Apple Crisp</h2>
            <span
            class="rating"
            role="img"
            aria-label="Rating: 4 out of 5 stars">
            <span aria-hidden="true" class="icon-star">⭐</span><span aria-hidden="true" class="icon-star">⭐</span><span aria-hidden="true" class="icon-star">⭐</span><span aria-hidden="true" class="icon-star">⭐</span><span aria-hidden="true" class="icon-star-empty">☆</span>
            </span><br>
            <p class="description">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
        </div>
    </article>
</main>
<footer>
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
    <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img class="social-preview-image" src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img class="social-preview-image" src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img class="social-preview-image" src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
</footer>
</body>
</html>
